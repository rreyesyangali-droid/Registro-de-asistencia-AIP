<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia AIP</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 20px;
            background: linear-gradient(-45deg, #e3f2fd, #bbdefb, #fff9c4, #f8bbd0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container { max-width: 1100px; margin: auto; background: rgba(255, 255, 255, 0.9); padding: 24px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; backdrop-filter: blur(5px); }
        .logo { display: block; margin: auto; width: 120px; margin-bottom: 20px; }
        .subtitulo { 
            font-family: Arial, Helvetica, sans-serif;
            font-size: 26px; color: #1a73e8; margin-bottom: 25px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1.5px;
            text-shadow: -1px -1px 0 #b3e5fc, 1px -1px 0 #b3e5fc, -1px 1px 0 #b3e5fc, 1px 1px 0 #b3e5fc;
        }
        .panel-asistencia { background: #fef9e7; border: 1px solid #f9e79f; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        select, input { padding: 12px; border-radius: 8px; border: 2px solid #1a73e8; font-size: 14px; outline: none; background: white; width: 100%; }
        /* FIX: validación visual para campo número */
        input[type="number"]:invalid { border-color: #e53935; }
        button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-success { background: #2e7d32; color: white; width: 100%; max-width: 400px; font-size: 16px; margin-top: 10px; }
        .btn-success:hover { background: #1b5e20; transform: translateY(-2px); }
        .semana-info { background: #e8f0fe; padding: 10px 20px; border-radius: 30px; display: inline-block; margin-bottom: 20px; font-size: 15px; color: #1a73e8; font-weight: bold; border: 1px solid #bbdefb; }
        .grid-wrapper { overflow-x: auto; margin-top: 20px; border-radius: 10px; border: 1px solid #ddd; }
        .grid { display: grid; grid-template-columns: 140px repeat(5, 1fr); gap: 5px; min-width: 800px; padding: 10px; background: #f9f9f9; }
        .header { background: #1a73e8; color: white; font-weight: bold; padding: 12px; border-radius: 5px; }
        .hora { background: #e3f2fd; padding: 10px; font-weight: bold; border-radius: 5px; font-size: 12px; color: #0d47a1; display: flex; align-items: center; justify-content: center; }
        .celda { min-height: 85px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #eee; border-radius: 5px; background: white; cursor: pointer; padding: 5px; text-align: center; font-size: 11px; transition: 0.2s; }
        .seleccionada { border: 2px solid #1a73e8 !important; background: #e3f2fd !important; }
        .recreo { background: #fff3e0; color: #e65100; cursor: default; font-weight: 900; font-size: 28px; font-family: 'Arial Black', Gadget, sans-serif; }
        .ocupado { color: white; font-weight: bold; cursor: default; }
        
        #panelAdmin { margin-top: 40px; padding: 25px; background: #fff; border-radius: 15px; border: 2px dashed #1a73e8; display: none; text-align: left; }
        .filtro-mensual { margin: 15px 0; background: #f1f8ff; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .historial-diario { margin-top: 20px; max-height: 500px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
        th { background: #1a73e8; color: white; padding: 12px; position: sticky; top: 0; z-index: 10; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; color: #333; }
        .btn-pdf { background: #c62828; color: white; cursor: pointer; }
        .btn-del { background: #ff5252; color: white; padding: 5px 8px; font-size: 10px; border-radius: 4px; cursor: pointer; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 15px 30px; border-radius: 50px; display: none; z-index: 2000; font-weight: bold; }
        #toast.show { display: block; }
        .chart-container { position: relative; height: 350px; width: 100%; margin: 20px 0; padding: 10px; background: #fff; border: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <img src="https://raw.githubusercontent.com/rreyesyangali-droid/reserva-crt/main/logo.jpg" class="logo" alt="Logo">
    <div class="subtitulo">REGISTRO DE ASISTENCIA AIP</div>
    <div class="semana-info" id="semana-actual">📅 Registro de la Semana: 06-04-2026</div>

    <div class="panel-asistencia">
        <div class="form-grid">
            <select id="docente">
                <option value="">Seleccione docente...</option>
                <option>SEMINARIO HUERTA PILAR</option>
                <option>SARANGO PEREZ MAGALY</option>
                <option>DIOSES GARAY MILAGROS</option>
                <option>CAISAHUANA MAYTA, FLOR DE MARIA</option>
                <option>MENA MENDOZA PATRICIA</option>
                <option>CONTRERAS CHANHUALLA SANDRA</option>
                <option>PAUCAR FLORES BEATRIZ</option>
                <option>LAZARES PEREZ ANA ROSALBINA</option>
                <option>CARRASCO ARIAS ANA CECILIA</option>
                <option>TASAYCO LUYO, LISSET KATHERINE</option>
                <option>RODRIGUEZ MOLINA MARY LUZ</option>
                <option>MALDONADO CUETO, PAOLA</option>
                <option>PACHERRES LEON JUANA</option>
                <option>CASTRO LLANTERHUAY KATHERIN</option>
                <option>TARMEÑO PASCO JAVIER</option>
                <option>QUISPE CCUNO MARTHA</option>
                <option>PAUCARCAJA RICSE FELIX</option>
                <option>MALASQUEZ CHUMPITAZI OFELIA</option>
                <option>CAMPOS MARTOS MILAGROS</option>
                <option>CABRERA GUERRA BETHY</option>
                <option>CASTRO BARDALES MARGOT</option>
                <option>MENDOZA PAREJA NICOLAS</option>
                <option>ALCANTARA SANDOVAL JOSE</option>
                <option>CUEVA CARDENAS ROGER</option>
                <option>BRAVO RAYMONDI MARISOL</option>
                <option>JIMENEZ BONIFACIO, ROSAMEL</option>
                <option>LIMACHE CORTEZ MARIA</option>
                <option>CCAJMA QUISPE ELIZABETH</option>
                <option>ZAMUDIO SOLORZANO DANIEL</option>
                <option>PIÑAN ARIZA CARMEN</option>
                <option>SOSA QUISPE EFRAIN</option>
                <option>DEYSI</option>
                <option>DIRECTIVOS</option>
                <option>PSICÓLOGO (A)</option>
                <option>DOCENTE DE SECUNDARIA</option>
                <option>VISITA/PERSONAL EXTERNO</option>
            </select>
            <select id="grado">
                <option value="">Grado...</option>
                <option>DIRECTIVOS</option><option>PSICÓLOGO (A)</option><option>VISITA/PERSONAL EXTERNO</option>
                <option>1°</option><option>2°</option><option>3°</option><option>4°</option><option>5°</option><option>6°</option>
            </select>
            <select id="seccion">
                <option value="">Sección...</option>
                <option>DIRECTIVOS</option><option>PSICÓLOGO (A)</option><option>VISITA/PERSONAL EXTERNO</option>
                <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option>
            </select>
            <!-- FIX: validación min/max para estudiantes -->
            <input type="number" id="estudiantes" placeholder="Cant. Estudiantes" min="0" max="50">
        </div>
        <div class="form-grid" style="grid-template-columns: 1fr 1fr;">
            <input type="text" id="tema" placeholder="Tema de la sesión de aprendizaje">
            <input type="text" id="recursos" placeholder="Recursos TIC utilizados">
        </div>
        <button class="btn-success" onclick="registrarAsistencia()">✅ REGISTRO DE ASISTENCIA</button>
    </div>

    <div class="grid-wrapper">
        <div class="grid" id="tabla"></div>
    </div>

    <div style="margin-top: 50px; border-top: 1px solid #ddd; padding-top: 20px;">
        <button onclick="checkAdmin()" style="background:none; border:none; color:#999; cursor:pointer; font-size: 14px; font-weight: bold;">🔐 Acceso Docente PIP - Primaria</button>
    </div>

    <div id="panelAdmin">
        <h3 style="color: #1a73e8; text-align: center;">📈 Informes y Estadísticas del Mes</h3>
        <div class="filtro-mensual">
            <label>Seleccionar Mes: </label>
            <input type="month" id="mesFiltro" onchange="generarReporteMensual()">
            <button class="btn-pdf" id="btnDescargar" onclick="exportarPDF()">📕 Descargar Informe PDF</button>
        </div>
        <div class="chart-container">
            <canvas id="graficoAsistencia"></canvas>
        </div>
        <div class="historial-diario">
            <table id="tablaInforme">
                <thead>
                    <tr>
                        <th>N°</th><th>DOCENTE</th><th>¿SESIÓN?</th><th>TEMA</th><th>RECURSO</th><th>G/S</th><th>CANT.</th><th>FECHA</th><th>HORA</th><th>ELIMINAR</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaInforme"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// CONFIGURACIÓN FIREBASE
// Nota: el apiKey es visible en el cliente (esto es normal en
// Firebase web). La seguridad real se gestiona en las REGLAS
// de Firebase Realtime Database. Configúralas en:
// Firebase Console → Realtime Database → Reglas
// Ejemplo de reglas recomendadas:
// {
//   "rules": {
//     "asistencias": {
//       ".read": false,
//       ".write": true
//     }
//   }
// }
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyAtUo0_SaYsJYhBSJ-CwW1GU1Y4Iemq92M",
    authDomain: "reserva-crt.firebaseapp.com",
    projectId: "reserva-crt",
    databaseURL: "https://reserva-crt-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const semanaId = "2026-04-06";
const horas = ["07:45 - 08:30", "08:30 - 09:15", "09:15 - 10:00", "RECREO", "10:30 - 11:15", "11:15 - 12:00", "12:00 - 12:45"];
const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"];
const breakLetras = ["B", "R", "E", "A", "K"];
let celdasSeleccionadas = [];
let miChart = null;
let datosInforme = [];

// FIX: función segura para generar IDs desde texto con tildes y caracteres especiales
function generarId(dia, hora) {
    try {
        return btoa(unescape(encodeURIComponent(dia + hora))).replace(/=/g, "").replace(/\+/g, "-").replace(/\//g, "_");
    } catch(e) {
        // Fallback: usar hash simple si btoa falla
        return (dia + hora).split('').reduce((acc, c) => acc + c.charCodeAt(0), 0).toString();
    }
}

function crearTabla() {
    const tabla = document.getElementById("tabla");
    let html = "<div></div>";
    dias.forEach(d => html += `<div class="header">${d}</div>`);
    horas.forEach(h => {
        html += `<div class="hora">${h === "RECREO" ? "10:00-10:30" : h}</div>`;
        dias.forEach((d, i) => {
            if (h === "RECREO") {
                html += `<div class="celda recreo">${breakLetras[i]}</div>`;
            } else {
                // FIX: usar generarId en vez de btoa directo
                const id = generarId(d, h);
                html += `<div class="celda" id="${id}" onclick="manejarClickCelda('${id}', '${d}', '${h}')"></div>`;
            }
        });
    });
    tabla.innerHTML = html;
}

function manejarClickCelda(id, d, h) {
    const el = document.getElementById(id);
    if (!el || el.classList.contains('ocupado')) return;
    const idx = celdasSeleccionadas.findIndex(c => c.id === id);
    if (idx > -1) {
        celdasSeleccionadas.splice(idx, 1);
        el.classList.remove('seleccionada');
    } else {
        celdasSeleccionadas.push({ id, d, h });
        el.classList.add('seleccionada');
    }
}

function registrarAsistencia() {
    const doc = document.getElementById("docente").value;
    const gra = document.getElementById("grado").value;
    const sec = document.getElementById("seccion").value;
    const estVal = document.getElementById("estudiantes").value;
    const tem = document.getElementById("tema").value.trim();
    const rec = document.getElementById("recursos").value.trim();

    if (!doc || !gra || !sec) { toast("⚠️ Seleccione docente, grado y sección"); return; }
    if (celdasSeleccionadas.length === 0) { toast("⚠️ Seleccione al menos una hora en la grilla"); return; }

    // FIX: validación de rango para número de estudiantes
    const est = parseInt(estVal, 10);
    if (estVal !== "" && (isNaN(est) || est < 0 || est > 50)) {
        toast("⚠️ Cantidad de estudiantes inválida (0-50)");
        return;
    }

    const updates = {};
    const hoy = new Date();
    const mesActual = hoy.toISOString().slice(0, 7);

    celdasSeleccionadas.forEach(c => {
        const key = db.ref().push().key;
        updates[key] = {
            docente: doc,
            grado: gra,
            seccion: sec,
            estudiantes: isNaN(est) ? "0" : String(est),
            tema: tem || "Sin tema",
            recursos: rec || "Ninguno",
            dia: c.d,
            hora: c.h,
            mes: mesActual,
            fecha: hoy.toLocaleDateString('es-PE'),
            presento: tem ? "SI" : "NO",
            semId: semanaId
        };
    });

    db.ref('asistencias/' + semanaId).update(updates)
        .then(() => {
            toast("✅ Registrado correctamente");
            setTimeout(() => location.reload(), 800);
        })
        .catch(err => {
            console.error("Error al guardar:", err);
            toast("❌ Error al guardar. Intente de nuevo.");
        });
}

function checkAdmin() {
    let clave = prompt("Clave:");
    // AVISO DE SEGURIDAD: considera mover la autenticación a Firebase Auth
    // para no exponer la clave en el código fuente.
    if (clave === "Yarvin24") {
        document.getElementById("panelAdmin").style.display = "block";
        document.getElementById("mesFiltro").value = new Date().toISOString().slice(0, 7);
        generarReporteMensual();
    } else if (clave !== null) {
        toast("❌ Clave incorrecta");
    }
}

function generarReporteMensual() {
    const mesSel = document.getElementById("mesFiltro").value;
    if (!mesSel) return;

    const cuerpo = document.getElementById("cuerpoTablaInforme");
    cuerpo.innerHTML = "";

    // FIX: limpiar datosInforme al inicio para evitar duplicados en el PDF
    datosInforme = [];

    const conteo = {};

    db.ref('asistencias').once('value', snap => {
        const todas = snap.val() || {};
        let i = 1;

        Object.keys(todas).forEach(sId => {
            const semana = todas[sId];
            if (!semana) return;

            Object.keys(semana).forEach(key => {
                const reg = semana[key];
                if (!reg || reg.mes !== mesSel) return;

                let etiqueta = "";
                const cargosEspeciales = ["DIRECTIVOS", "PSICÓLOGO (A)", "VISITA/PERSONAL EXTERNO"];

                if (cargosEspeciales.includes(reg.grado)) {
                    etiqueta = reg.grado;
                } else {
                    let partes = reg.docente.trim().split(' ');
                    let nombre = partes.length >= 3 ? partes[2] : partes[0];
                    etiqueta = nombre + " " + reg.grado + reg.seccion;
                }

                conteo[etiqueta] = (conteo[etiqueta] || 0) + 1;
                datosInforme.push({ ...reg, sId, key });

                cuerpo.innerHTML += `<tr>
                    <td>${i++}</td>
                    <td style="text-align:left">${reg.docente}</td>
                    <td>${reg.presento}</td>
                    <td style="text-align:left">${reg.tema}</td>
                    <td style="text-align:left">${reg.recursos}</td>
                    <td>${reg.grado}-${reg.seccion}</td>
                    <td>${reg.estudiantes}</td>
                    <td>${reg.fecha}</td>
                    <td>${reg.hora}</td>
                    <td><button class="btn-del" onclick="eliminarRegistro('${sId}', '${key}')">✖</button></td>
                </tr>`;
            });
        });

        actualizarGrafico(conteo);
    }).catch(err => {
        console.error("Error al cargar datos:", err);
        toast("❌ Error al cargar el reporte.");
    });
}

function actualizarGrafico(conteo) {
    // FIX: verificar que ChartDataLabels esté disponible antes de usarlo
    const ctx = document.getElementById('graficoAsistencia').getContext('2d');
    if (miChart) miChart.destroy();

    const etiquetas = Object.keys(conteo);
    const valores = Object.values(conteo);
    if (etiquetas.length === 0) return;

    const total = valores.reduce((a, b) => a + b, 0);
    const colores = ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF','#FF9F40','#009688','#795548','#607D8B','#E91E63'];

    const plugins = []; 
    const pluginOptions = { legend: { display: false } };

    // FIX: solo registrar ChartDataLabels si está disponible
    if (typeof ChartDataLabels !== 'undefined') {
        plugins.push(ChartDataLabels);
        pluginOptions.datalabels = {
            anchor: 'end', align: 'top',
            formatter: (v) => v + " (" + ((v / total) * 100).toFixed(1) + "%)",
            font: { weight: 'bold', size: 10 }
        };
    }

    miChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: etiquetas,
            datasets: [{
                data: valores,
                backgroundColor: colores.slice(0, etiquetas.length)
            }]
        },
        plugins: plugins,
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: pluginOptions,
            scales: {
                y: { beginAtZero: true },
                x: { ticks: { font: { size: 10, weight: 'bold' } } }
            }
        }
    });
}

function exportarPDF() {
    if (datosInforme.length === 0) { toast("⚠️ No hay datos para exportar"); return; }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    const mes = document.getElementById("mesFiltro").value;

    doc.text("I.E. Nº 0162 SAN JOSÉ OBRERO - INFORME MENSUAL", 148, 15, { align: "center" });

    const filas = datosInforme.map((r, i) => [
        i + 1, r.docente, r.presento, r.tema, r.recursos,
        r.grado + "-" + r.seccion, r.estudiantes, r.fecha, r.hora
    ]);

    doc.autoTable({
        startY: 25,
        head: [['N°', 'DOCENTE', 'SESIÓN', 'TEMA', 'RECURSOS', 'G-S', 'EST.', 'FECHA', 'HORA']],
        body: filas,
        theme: 'grid',
        styles: { fontSize: 7 }
    });

    let finalY = doc.lastAutoTable.finalY + 10;
    if (finalY > 120) { doc.addPage(); finalY = 20; }

    doc.text("RESUMEN ESTADÍSTICO:", 14, finalY);
    const canvas = document.getElementById('graficoAsistencia');
    doc.addImage(canvas.toDataURL("image/png"), 'PNG', 15, finalY + 5, 260, 90);
    doc.save("Informe_AIP_" + mes + ".pdf");
}

function eliminarRegistro(sId, key) {
    if (confirm("¿Eliminar este registro?")) {
        db.ref("asistencias/" + sId + "/" + key).remove()
            .then(() => {
                toast("🗑️ Registro eliminado");
                generarReporteMensual();
            })
            .catch(err => {
                console.error("Error al eliminar:", err);
                toast("❌ No se pudo eliminar.");
            });
    }
}

function toast(m) {
    const t = document.getElementById("toast");
    t.textContent = m;
    t.className = "show";
    setTimeout(() => t.className = "", 3000);
}

// FIX: un solo listener y una sola llamada a crearTabla
// (antes había crearTabla() duplicado al final del script)
crearTabla();

db.ref('asistencias/' + semanaId).on('value', snap => {
    const data = snap.val();
    crearTabla(); // refrescar grilla con datos actuales

    if (!data) return;

    Object.keys(data).forEach(key => {
        const reg = data[key];
        if (!reg) return;

        // FIX: usar la misma función generarId() para garantizar consistencia
        const id = generarId(reg.dia, reg.hora);
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('ocupado');
            el.style.background = "#1a73e8";
            el.innerHTML = "<div style='color:white;'><b>" + reg.docente.split(' ')[0] + "</b><br>" + reg.grado + reg.seccion + "</div>";
        }
    });
});
</script>
</body>
</html>
